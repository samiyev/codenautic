name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-policy:
    name: Commit Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            RANGE="${PR_BASE_SHA}..${PR_HEAD_SHA}"
            echo "Validating commit policy in range: ${RANGE}"
            bash scripts/git/validate-commit-message.sh --range "${RANGE}"
          else
            if [ "${PUSH_BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t PUSH_COMMITS < <(
                node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8")); for (const commit of (data.commits ?? [])) { if (commit.id) { console.log(commit.id) } }' \
                  | awk '!seen[$0]++'
              )

              if [ "${#PUSH_COMMITS[@]}" -eq 0 ]; then
                PUSH_COMMITS=("${PUSH_HEAD_SHA}")
              fi

              echo "Validating commit policy in ${#PUSH_COMMITS[@]} pushed commits"
              for commit_sha in "${PUSH_COMMITS[@]}"; do
                bash scripts/git/validate-commit-message.sh --range "${commit_sha}"
              done
            else
              RANGE="${PUSH_BASE_SHA}..${PUSH_HEAD_SHA}"
              echo "Validating commit policy in range: ${RANGE}"
              bash scripts/git/validate-commit-message.sh --range "${RANGE}"
            fi
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --filter '*' lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --filter '*' typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --filter '*' test

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --filter '*' format:check

  heuristics-guard:
    name: Heuristics Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run heuristics:build-registry
      - run: bun run heuristics:validate-registry
      - run: bun run heuristics:validate-rules-794
      - run: bun run heuristics:lint-plan-criteria

  commit-email:
    name: Verify Commit Email
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for corporate emails
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ALLOWED="gmail\.com|users\.noreply\.github\.com|yahoo\.com|outlook\.com|hotmail\.com|protonmail\.com|icloud\.com|me\.com|hey\.com"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            RANGE="${PR_BASE_SHA}..${PR_HEAD_SHA}"
            BLOCKED=$(git log "${RANGE}" --format='%ae' | grep -vE "@($ALLOWED)$" || true)
          else
            if [ "${PUSH_BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t PUSH_COMMITS < <(
                node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8")); for (const commit of (data.commits ?? [])) { if (commit.id) { console.log(commit.id) } }' \
                  | awk '!seen[$0]++'
              )

              if [ "${#PUSH_COMMITS[@]}" -eq 0 ]; then
                PUSH_COMMITS=("${PUSH_HEAD_SHA}")
              fi

              BLOCKED=$(git show -s --format='%ae' "${PUSH_COMMITS[@]}" | grep -vE "@($ALLOWED)$" || true)
            else
              RANGE="${PUSH_BASE_SHA}..${PUSH_HEAD_SHA}"
              BLOCKED=$(git log "${RANGE}" --format='%ae' | grep -vE "@($ALLOWED)$" || true)
            fi
          fi

          if [ -n "$BLOCKED" ]; then
            echo ""
            echo "  BLOCKED: corporate email detected in commits:"
            echo ""
            echo "$BLOCKED" | sort -u | sed 's/^/    /'
            echo ""
            echo "  Fix: git config --local user.email \"you@gmail.com\""
            echo "  Then amend or rebase your commits."
            echo ""
            exit 1
          fi
